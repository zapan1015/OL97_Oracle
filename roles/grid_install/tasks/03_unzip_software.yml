---
# ======================================================================
#  03_unzip_software.yml – GI 소프트웨어 압축 해제
#  실행: grid 사용자, 양 노드
#  멱등성: gridSetup.sh 존재 여부로 스킵 판단
# ======================================================================

- name: "[GI-03] GI zip 파일 존재 확인"
  ansible.builtin.stat:
    path: "{{ oracle_sw_path }}/{{ grid_zip }}"
  register: grid_zip_stat

- name: "[GI-03] GI zip 파일 없음 – 설치 불가 (중단)"
  ansible.builtin.fail:
    msg: |
      GI 설치 미디어를 찾을 수 없습니다.
        경로: {{ oracle_sw_path }}/{{ grid_zip }}
      ./oracle/ 디렉토리에 다음 파일을 위치시키십시오:
        - LINUX.X64_193000_grid_home.zip  (19c Grid Infrastructure)
  when: not grid_zip_stat.stat.exists

- name: "[GI-03] gridSetup.sh 이미 존재 여부 확인 (압축 해제 스킵 판단)"
  ansible.builtin.stat:
    path: "{{ grid_home }}/gridSetup.sh"
  register: grid_setup_stat

- name: "[GI-03] GI 소프트웨어 압축 해제 → {{ grid_home }}"
  ansible.builtin.unarchive:
    src: "{{ oracle_sw_path }}/{{ grid_zip }}"
    dest: "{{ grid_home }}"
    remote_src: yes
    owner: "{{ grid_user }}"
    group: oinstall
    extra_opts:
      - "-q"    # quiet mode
  become: yes
  become_user: "{{ grid_user }}"
  when: not grid_setup_stat.stat.exists
  async: "{{ unzip_timeout }}"
  poll: 30
  register: unzip_result

- name: "[GI-03] 압축 해제 결과"
  ansible.builtin.debug:
    msg: "{{ '압축 해제 완료' if unzip_result.changed is defined and unzip_result.changed else '이미 압축 해제됨 (skip)' }}"

- name: "[GI-03] Grid Home 디렉토리 소유권 재설정"
  ansible.builtin.file:
    path: "{{ grid_home }}"
    owner: "{{ grid_user }}"
    group: oinstall
    recurse: yes
  when: unzip_result.changed is defined and unzip_result.changed

- name: "[GI-03] gridSetup.sh 실행 권한 확인"
  ansible.builtin.stat:
    path: "{{ grid_home }}/gridSetup.sh"
  register: final_setup_stat

- name: "[GI-03] gridSetup.sh 권한 설정"
  ansible.builtin.file:
    path: "{{ grid_home }}/gridSetup.sh"
    mode: '0755'
  when: final_setup_stat.stat.exists
