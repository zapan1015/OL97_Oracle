---
# ======================================================================
#  08_cvu_precheck.yml – CVU(Cluster Verification Utility) 사전 검증
#  runcluvfy.sh stage -pre crsinst 로 클러스터 준비 상태 검증
#  실행: grid 사용자, racnode1 only
# ======================================================================

- name: "[GI-08] runcluvfy.sh 존재 확인"
  ansible.builtin.stat:
    path: "{{ grid_home }}/runcluvfy.sh"
  register: cluvfy_stat

- name: "[GI-08] CVU 도구 없음 – 소프트웨어 압축 해제 확인 필요"
  ansible.builtin.fail:
    msg: "runcluvfy.sh 를 찾을 수 없습니다. 03_unzip_software 단계를 먼저 실행하십시오."
  when: not cluvfy_stat.stat.exists

- name: "[GI-08] CVU 사전 검증 실행 (PRVF 오류 시 로그 확인)"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ grid_home }}
    export PATH=$ORACLE_HOME/bin:$PATH
    cd {{ grid_home }}

    NODES="{{ groups['racnodes'] | join(',') }}"

    ./runcluvfy.sh stage -pre crsinst \
      -n ${NODES} \
      -osdba {{ dba_group }} \
      -orainv {{ oinstall_group }} \
      -verbose 2>&1
  become_user: "{{ grid_user }}"
  register: cvu_result
  changed_when: false
  failed_when:
    - cvu_result.rc != 0
    - not cvu_ignore_failures
  async: 600
  poll: 20

- name: "[GI-08] CVU 결과 로그 저장 (/tmp/cvu_precheck.log)"
  ansible.builtin.copy:
    content: "{{ cvu_result.stdout }}"
    dest: /tmp/cvu_precheck.log
    owner: "{{ grid_user }}"
    group: oinstall
    mode: '0644'
  become: yes
  become_user: root

- name: "[GI-08] CVU 실패 항목 요약 출력"
  ansible.builtin.shell: |
    grep -E "PRVF-|FAILED|WARN" /tmp/cvu_precheck.log | head -40 || echo "(실패 항목 없음)"
  register: cvu_failures
  changed_when: false

- name: "[GI-08] CVU FAIL/WARN 목록"
  ansible.builtin.debug:
    msg: "{{ cvu_failures.stdout_lines }}"

- name: "[GI-08] CVU 최종 판정"
  ansible.builtin.debug:
    msg: >
      CVU 결과: {{ 'PASS' if cvu_result.rc == 0 else 'WARN/FAIL (cvu_ignore_failures=' + cvu_ignore_failures | string + ')' }}
      상세 로그: /tmp/cvu_precheck.log

# ── CVU -fixup 스크립트 실행 (자동 수정 가능한 항목) ─────────────────
- name: "[GI-08] CVU fixup 스크립트 실행 (자동 수정)"
  ansible.builtin.shell: |
    FIXUP_SCRIPT=$(ls /tmp/CVUfixup.sh 2>/dev/null | head -1)
    if [ -n "$FIXUP_SCRIPT" ]; then
      chmod +x "$FIXUP_SCRIPT"
      bash "$FIXUP_SCRIPT" 2>&1
      echo "FIXUP_APPLIED"
    else
      echo "NO_FIXUP_NEEDED"
    fi
  become: yes
  register: fixup_result
  changed_when: "'FIXUP_APPLIED' in fixup_result.stdout"

- name: "[GI-08] Fixup 실행 결과"
  ansible.builtin.debug:
    msg: "{{ fixup_result.stdout_lines }}"
  when: "'FIXUP_APPLIED' in fixup_result.stdout"
