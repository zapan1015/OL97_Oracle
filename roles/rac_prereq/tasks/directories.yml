---
# Oracle 디렉토리 구조 생성

- name: Create Oracle directory structure
  ansible.builtin.file:
    path:  "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode:  "{{ item.mode }}"
  loop: "{{ oracle_directories }}"
  loop_control:
    label: "{{ item.path }}"
